
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color: #f4f7f6;
            padding: 20px;
        }
        .card{
            max-width: 600px;
            margin: auto;
            border-radius: 15px;

        }
    </style>
</head>
    
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4" style="max-width: 800px; margin: auto;">

        <h2 class="text-cneter mb-4">Expense Tracker</h2>
        <form id="expenseForm" class="row g-3">

            <div class="col-md-3">
            <label class="form-label">Choose expenseamount:</label>
             <input type="number" id="amount" class="form-control" required>
        </div>

        <div class="col-md-3"></div>
        <label class="form-label">Choose description:</label>
        <input type="text" id="description" class="form-control" list="descriptionOptions" required>

        <datalist id="descriptionOptions">
            <option value="sads"></option>
            <option value="Petrol"></option>
            <option value="On vacation"></option>
            <option value="diesel"></option>
            <option value="hello"></option>
            <option value="1233"></option>
            <option value="Movie"></option>

        </datalist>
    </div>


    <div class="mb-3">
        <label for="category" class="form-label">Choose a category:</label>
        <select id="category" class="form-select">

            <option value="fuel">fuel</option>
            <option value="food">food</option>
            <option value="electricity">electricity</option>
            <option value="movie">movie</option>
        </select>
    </div>


    <div class="col-md-3 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">Add Expense</button>
    </div>
    
        </form>
    
</div>

</div class="mt-4" style="max-width:600px; margin:auto;">
<ul id="expenseList" class="list-group"></ul>
</div>


<script src ="script.js"></script>
</body>
</html>
